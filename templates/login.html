{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Enterprise RAG Assistant</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card glass-panel animate-fade-in" style="max-width: 480px;">
            <div class="brand-header" style="margin-bottom: 1.5rem;">
                <div class="brand-logo-icon">E</div>
                <h1 class="brand-title">Enterprise AI</h1>
                <p class="brand-subtitle">Knowledge Retrieval & Analysis Engine</p>
            </div>

            <!-- Tabs Toggler -->
            <div class="form-toggle-tabs" style="display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 1.5rem; gap: 0.5rem;">
                <button type="button" id="tabLogin" class="btn-toggle-tab" style="flex: 1; padding: 0.65rem; background: none; border: none; border-bottom: 2px solid var(--primary); color: white; cursor: pointer; font-family: var(--font-heading); font-weight: 600; font-size: 0.95rem;">Access</button>
                <button type="button" id="tabRegister" class="btn-toggle-tab" style="flex: 1; padding: 0.65rem; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-secondary); cursor: pointer; font-family: var(--font-heading); font-weight: 600; font-size: 0.95rem;">Register</button>
            </div>

            <!-- Error/Success Banner -->
            <div id="alertMessage" class="alert" style="display: none;">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="alertIcon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <span id="alertText">Error occurred.</span>
            </div>

            <!-- LOGIN VIEW -->
            <div id="loginSection">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">Enterprise Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" class="form-input" placeholder="name@company.com" required autocomplete="username">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-primary">
                        <span id="btnText">Access Console</span>
                        <span id="btnSpinner" class="spinner" style="display: none;"></span>
                    </button>
                </form>
            </div>

            <!-- REGISTER VIEW -->
            <div id="registerSection" style="display: none;">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regFullName" class="form-label">Full Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="regFullName" class="form-input" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regEmail" class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="regEmail" class="form-input" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regPassword" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="regPassword" class="form-input" placeholder="••••••••" required minlength="6">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regRole" class="form-label">Account Role</label>
                        <div class="input-wrapper">
                            <select id="regRole" class="form-input" style="background: rgba(8, 7, 13, 0.85); color: white;">
                                <option value="customer" selected>General User (Customer)</option>
                                <option value="employee">Company Employee</option>
                                <option value="manager">Company Manager</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" id="regCompanyGroup">
                        <label for="regCompany" class="form-label">Company Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="regCompany" class="form-input" placeholder="companyabc" required>
                        </div>
                        <span id="compHint" style="font-size: 0.72rem; color: var(--text-muted); display: block; margin-top: 0.25rem;">
                            * The company must exist first. Only Managers can create new companies.
                        </span>
                    </div>

                    <div class="form-group" id="regDeptGroup" style="display: none;">
                        <label for="regDepartment" class="form-label">Department / Division</label>
                        <div class="input-wrapper">
                            <input type="text" id="regDepartment" class="form-input" placeholder="e.g. engineering">
                        </div>
                    </div>

                    <button type="submit" id="regSubmitBtn" class="btn-primary" style="margin-top: 1.5rem;">
                        <span id="regBtnText">Create Account</span>
                        <span id="regBtnSpinner" class="spinner" style="display: none;"></span>
                    </button>
                </form>
            </div>

        </div>
    </div>

    <!-- Inject Authentication Engine -->
    <script src="{% static 'js/auth.js' %}"></script>
    <script>
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginSection = document.getElementById('loginSection');
        const registerSection = document.getElementById('registerSection');
        const alertMessage = document.getElementById('alertMessage');
        const alertText = document.getElementById('alertText');
        const alertIcon = document.getElementById('alertIcon');

        // Dynamic Registration Field Helpers
        const regRole = document.getElementById('regRole');
        const regDeptGroup = document.getElementById('regDeptGroup');
        const regCompany = document.getElementById('regCompany');
        const compHint = document.getElementById('compHint');

        // Toggle Tabs
        tabLogin.addEventListener('click', () => {
            tabLogin.style.borderBottomColor = 'var(--primary)';
            tabLogin.style.color = 'white';
            tabRegister.style.borderBottomColor = 'transparent';
            tabRegister.style.color = 'var(--text-secondary)';
            loginSection.style.display = 'block';
            registerSection.style.display = 'none';
            alertMessage.style.display = 'none';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.style.borderBottomColor = 'var(--primary)';
            tabRegister.style.color = 'white';
            tabLogin.style.borderBottomColor = 'transparent';
            tabLogin.style.color = 'var(--text-secondary)';
            registerSection.style.display = 'block';
            loginSection.style.display = 'none';
            alertMessage.style.display = 'none';
        });

        // Toggle company and department hints/fields
        regRole.addEventListener('change', () => {
            const role = regRole.value;
            if (role === 'customer') {
                regDeptGroup.style.display = 'none';
                compHint.textContent = '* General users register under an existing company. Direct immediate access.';
            } else if (role === 'employee') {
                regDeptGroup.style.display = 'block';
                compHint.textContent = '* Company must already exist. Registration requires Manager approval.';
            } else if (role === 'manager') {
                regDeptGroup.style.display = 'block';
                compHint.textContent = '* Creates a new company or claims ownership of an existing one. Active immediately.';
            }
        });

        function showAlert(text, type = 'danger') {
            alertText.textContent = text;
            alertMessage.className = `alert alert-${type}`;
            
            if (type === 'success') {
                // Success checkmark SVG
                alertIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />';
            } else {
                // Danger warning SVG
                alertIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />';
            }
            alertMessage.style.display = 'flex';
        }

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'inline-block';
            alertMessage.style.display = 'none';

            try {
                await AuthManager.login(email, password);
                window.location.href = '/';
            } catch (err) {
                showAlert(err.message || 'Login failed. Please try again.', 'danger');
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
            }
        });

        // Register Handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('regFullName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = regRole.value;
            const companyName = regCompany.value;
            const department = document.getElementById('regDepartment').value;
            
            const regSubmitBtn = document.getElementById('regSubmitBtn');
            const regBtnText = document.getElementById('regBtnText');
            const regBtnSpinner = document.getElementById('regBtnSpinner');

            regSubmitBtn.disabled = true;
            regBtnText.style.display = 'none';
            regBtnSpinner.style.display = 'inline-block';
            alertMessage.style.display = 'none';

            try {
                const response = await fetch('/api/accounts/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password,
                        full_name: fullName,
                        role,
                        company_name: companyName,
                        department
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Registration failed.');
                }

                showAlert(data.detail || 'Registration successful!', 'success');
                
                // Clear register form inputs
                document.getElementById('registerForm').reset();
                regDeptGroup.style.display = 'none';

                // Automatically switch back to login tab after 3 seconds
                setTimeout(() => {
                    tabLogin.click();
                    document.getElementById('email').value = email;
                    document.getElementById('password').value = password;
                }, 3500);

            } catch (err) {
                showAlert(err.message, 'danger');
            } finally {
                regSubmitBtn.disabled = false;
                regBtnText.style.display = 'inline';
                regBtnSpinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
